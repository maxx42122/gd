name: technova
description: "AI Health Triage & Muscle Symptom Analyzer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # SVG / Drawing
  flutter_svg: ^2.0.0
  path_drawing: ^1.0.1
  xml: ^6.5.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_analytics: ^11.3.3
  cloud_functions: ^5.1.3

  # State Management
  flutter_riverpod: ^2.5.1

  # UI / Animations
  flutter_animate: ^4.5.0
  fl_chart: ^0.69.0
  loading_animation_widget: ^1.3.0
  google_fonts: ^6.2.1

  # Voice
  speech_to_text: ^7.0.0
  avatar_glow: ^3.0.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/svg/
