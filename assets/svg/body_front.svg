<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 800" width="340" height="800">
<defs>
  <radialGradient id="skinGrad" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#F5CBA7"/>
    <stop offset="60%" stop-color="#E8A87C"/>
    <stop offset="100%" stop-color="#C8845A"/>
  </radialGradient>
  <radialGradient id="muscleOrange" cx="40%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#E8834A"/>
    <stop offset="50%" stop-color="#C85A20"/>
    <stop offset="100%" stop-color="#8B3A10"/>
  </radialGradient>
  <radialGradient id="musclePurple" cx="40%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#9B6FD4"/>
    <stop offset="50%" stop-color="#7040B0"/>
    <stop offset="100%" stop-color="#4A2080"/>
  </radialGradient>
  <radialGradient id="muscleTeal" cx="40%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#3ABFBF"/>
    <stop offset="50%" stop-color="#1A8F8F"/>
    <stop offset="100%" stop-color="#0A5F5F"/>
  </radialGradient>
  <radialGradient id="muscleGreen" cx="40%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#4DC87A"/>
    <stop offset="50%" stop-color="#2A9A50"/>
    <stop offset="100%" stop-color="#0A6030"/>
  </radialGradient>
  <radialGradient id="muscleMagenta" cx="40%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#E060C0"/>
    <stop offset="50%" stop-color="#B03090"/>
    <stop offset="100%" stop-color="#700060"/>
  </radialGradient>
  <radialGradient id="muscleBlue" cx="40%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#5090E8"/>
    <stop offset="50%" stop-color="#2860C0"/>
    <stop offset="100%" stop-color="#0A3080"/>
  </radialGradient>
  <radialGradient id="muscleRed" cx="40%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#E84040"/>
    <stop offset="50%" stop-color="#B01010"/>
    <stop offset="100%" stop-color="#700000"/>
  </radialGradient>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000040"/>
  </filter>
  <style>
    .outline { stroke: #1A0800; stroke-width: 1.2; stroke-linejoin: round; }
    .thin    { stroke: #1A0800; stroke-width: 0.6; stroke-linejoin: round; }
    .fiber   { stroke: rgba(255,255,255,0.25); stroke-width: 0.5; fill: none; }
  </style>
</defs>

